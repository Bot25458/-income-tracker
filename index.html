<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:20px}
input,select,button{width:100%;padding:10px;margin:5px 0}
.row{display:flex;gap:10px}
.row>*{flex:1}
.card{border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:8px}
button{cursor:pointer}
.warning{font-weight:bold}

#undoBox{
display:none;
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#333;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<h2> Finance </h2>

<!-- INCOME -->
<h3>💵 Income</h3>

<div class="row">
<input type="text" id="incomeName" placeholder="Income type">
<input type="number" id="incomeAmount" placeholder="Amount">
</div>
<button onclick="addIncome()">Add Income</button>

<div id="incomeList"></div>

<hr>

<!-- BUDGET -->
<h3>🎯 Budget</h3>
<input type="number" id="budget" placeholder="Set budget" oninput="render()">
<p id="budgetStatus" class="warning"></p>

<hr>

<!-- EXPENSE -->
<h3>💸 Expense</h3>

<div class="row">
<input type="text" id="expName" placeholder="Expense name">
<input type="number" id="expAmount" placeholder="Amount">
</div>

<div class="row">
<select id="category">
<option>Food</option>
<option>Rent</option>
<option>Transport</option>
<option>Shopping</option>
<option>Other</option>
</select>

<input type="date" id="date">
</div>

<button onclick="addExpense()">Add Expense</button>

<h3>📋 Expenses</h3>
<div id="expenseList"></div>

<hr>

<h3>💳 Debt Tracker</h3>

<div class="row">
<input type="text" id="debtName" placeholder="Borrowed From">
<input type="number" id="debtAmount" placeholder="Borrowed Amount">
</div>

<button onclick="addDebt()">Add Debt</button>

<div id="debtList"></div>

<hr>

<p>Total Debt: <span id="totalDebt"></span></p>
<p>Total Paid: <span id="totalPaid"></span></p>
<p>Remaining Debt: <span id="remainingDebt"></span></p>

<h3>📅 Monthly Debt Report</h3>
<p>This Month Paid:
<span id="monthlyDebtPaid">¥0</span>
</p>
<div id="paymentHistory"></div>

<h3>📊 Summary</h3>
<p>Total Income: <span id="incomeTotal"></span></p>
<p>Total Expense: <span id="expenseTotal"></span></p>
<p>Balance: <span id="balance"></span></p>

<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>

<!-- UNDO BOX -->
<div id="undoBox">
Item deleted
<button onclick="undoDelete()">Undo</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCB6STfr6FWPbPddQzyooOjtwHSo85KJd8",
authDomain: "income-tracker-c1b8c.firebaseapp.com",
projectId: "income-tracker-c1b8c",
storageBucket: "income-tracker-c1b8c.appspot.com",
messagingSenderId: "809343066758",
appId: "1:809343066758:web:608a4480f1e85d992d6707"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let incomes = [];
let expenses = [];
let debts = [];

let lastDeleted = null;
let lastType = null; // income or expense

/* ================= INCOME ================= */

window.addIncome = async function(){
let name = document.getElementById("incomeName").value;
let amount = Number(document.getElementById("incomeAmount").value);

if(!name || amount<=0) return;

await addDoc(collection(db,"incomes"),{name,amount});

document.getElementById("incomeName").value="";
document.getElementById("incomeAmount").value="";
};

onSnapshot(collection(db,"incomes"),snap=>{
incomes = snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});

/* ================= EXPENSE ================= */

window.addExpense = async function(){
let name = document.getElementById("expName").value;
let amount = Number(document.getElementById("expAmount").value);
let category = document.getElementById("category").value;
let date = document.getElementById("date").value;

if(!name || amount<=0) return;

await addDoc(collection(db,"expenses"),{
name,amount,category,date
});

document.getElementById("expName").value="";
document.getElementById("expAmount").value="";
};

window.addDebt = async function(){

const name =
document.getElementById("debtName").value;

const amount =
Number(document.getElementById("debtAmount").value);

if(!name || amount<=0) return;

await addDoc(collection(db,"debts"),{
name,
borrowed:amount,
paid:0
});

document.getElementById("debtName").value="";
document.getElementById("debtAmount").value="";
}

/* ================= PAY DEBT ================= */

window.payDebt = async function(id){

const debt =
debts.find(d=>d.id===id);

let payment =
prompt("Payment Amount");

payment = Number(payment);

if(!payment || payment<=0) return;

await updateDoc(
doc(db,"debts",id),
{
paid:(debt.paid || 0) + payment
}
);

// Save Payment History
await addDoc(collection(db,"debtPayments"),{
debtId:id,
name:debt.name,
amount:payment,
date:new Date().toISOString()
});
}

onSnapshot(collection(db,"expenses"),snap=>{
expenses = snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});

onSnapshot(collection(db,"debts"),snap=>{
debts = snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});

window.deleteDebt = async function(id){

const debt = debts.find(d=>d.id===id);

lastDeleted = debt;
lastType = "debt";

await deleteDoc(doc(db,"debts",id));

showUndo();

}

/* ================= DELETE (INCOME + EXPENSE) ================= */

window.deleteItem = async function(id,type){

let item = (type==="income")
? incomes.find(i=>i.id===id)
: expenses.find(e=>e.id===id);

lastDeleted = item;
lastType = type;

await deleteDoc(doc(db,type==="income"?"incomes":"expenses",id));

showUndo();
}

/* ================= UNDO ================= */

function showUndo(){
document.getElementById("undoBox").style.display="block";

setTimeout(()=>{
document.getElementById("undoBox").style.display="none";
lastDeleted=null;
lastType=null;
},8000);
}

window.undoDelete = async function(){

if(!lastDeleted || !lastType) return;

if(lastType==="income"){

await addDoc(collection(db,"incomes"),{
name:lastDeleted.name,
amount:lastDeleted.amount
});

}
else if(lastType==="expense"){

await addDoc(collection(db,"expenses"),{
name:lastDeleted.name,
amount:lastDeleted.amount,
category:lastDeleted.category,
date:lastDeleted.date
});

}
else if(lastType==="debt"){

await addDoc(collection(db,"debts"),{
name:lastDeleted.name,
borrowed:lastDeleted.borrowed,
paid:lastDeleted.paid || 0
});

}

document.getElementById("undoBox").style.display="none";
lastDeleted=null;
lastType=null;
}

/* ================= RENDER ================= */

function render(){

let totalIncome = incomes.reduce((a,b)=>a+b.amount,0);
let totalExpense = expenses.reduce((a,b)=>a+b.amount,0);
let balance = totalIncome - totalExpense;

// UI
document.getElementById("incomeTotal").innerText="¥"+totalIncome;
document.getElementById("expenseTotal").innerText="¥"+totalExpense;
document.getElementById("balance").innerText="¥"+balance;

// INCOME LIST
document.getElementById("incomeList").innerHTML =
incomes.map(i=>`
<div class="card">
💵 ${i.name} - ¥${i.amount}<br><br>
<button onclick="deleteItem('${i.id}','income')">🗑 Delete</button>
</div>
`).join("");

// EXPENSE LIST
document.getElementById("expenseList").innerHTML =
expenses.map(e=>`
<div class="card">
${e.date||"-"} | ${e.category}<br>
${e.name} - ¥${e.amount}<br><br>
<button onclick="deleteItem('${e.id}','expense')">🗑 Delete</button>
</div>
`).join("");

// DEBT LIST

let totalDebt = 0;
let totalPaid = 0;

document.getElementById("debtList").innerHTML =
debts.map(d=>{

const remaining =
d.borrowed - (d.paid || 0);

totalDebt += d.borrowed;
totalPaid += (d.paid || 0);

return `
<div class="card">
👤 ${d.name}<br>
Borrowed: ¥${d.borrowed}<br>
Paid: ¥${d.paid || 0}<br>
Remaining: ¥${remaining}<br><br>

<button onclick="payDebt('${d.id}')">
💰 Add Payment
</button>

<button onclick="deleteDebt('${d.id}')">
🗑 Delete
</button>

</div>
`;

}).join("");

document.getElementById("totalDebt").innerText =
"¥" + totalDebt;

document.getElementById("totalPaid").innerText =
"¥" + totalPaid;

document.getElementById("remainingDebt").innerText =
"¥" + (totalDebt - totalPaid);

// BUDGET AI
let budget = Number(document.getElementById("budget").value || 0);
let percent = budget>0?(totalExpense/budget)*100:0;

let text="",color="";

if(budget>0){
if(percent>=100){text="🚨 OVER BUDGET";color="red";}
else if(percent>=90){text="⚠️ Danger";color="orange";}
else if(percent>=70){text="🟡 Warning";color="goldenrod";}
else{text="🟢 Safe";color="green";}

let el=document.getElementById("budgetStatus");
el.innerText=text+" ("+percent.toFixed(1)+"%)";
el.style.color=color;
}

drawCharts(totalIncome,totalExpense,expenses);
}

/* ================= CHARTS ================= */

let bar,pie;

function drawCharts(income,expense,list){

if(bar) bar.destroy();
if(pie) pie.destroy();

bar=new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Income","Expense"],
datasets:[{data:[income,expense]}]
}
});

let cat={};
list.forEach(e=>{
cat[e.category]=(cat[e.category]||0)+e.amount;
});

pie=new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:Object.keys(cat),
datasets:[{data:Object.values(cat)}]
}
});
}

</script>

</body>
</html>
