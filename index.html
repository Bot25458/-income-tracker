<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Tracker Firebase FULL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;max-width:800px;margin:auto;padding:20px}
input,select,button{width:100%;padding:10px;margin:5px 0}
.card{border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:8px}
.row{display:flex;gap:10px}
.row>*{flex:1}
button{cursor:pointer}
.warning{color:red;font-weight:bold}
</style>
</head>

<body>

<h2>💰 Income Tracker (Firebase FULL)</h2>

<label>Monthly Income</label>
<input type="number" id="income" oninput="render()">

<div class="row">
<input type="text" id="name" placeholder="Expense name">
<input type="number" id="amount" placeholder="Amount">
</div>

<div class="row">
<select id="category">
<option>Food</option>
<option>Rent</option>
<option>Transport</option>
<option>Shopping</option>
<option>Other</option>
</select>

<input type="date" id="date">
</div>

<button onclick="addExpense()">Add Expense</button>

<h3>📋 Expenses</h3>
<div id="list"></div>

<h3>💹 Summary</h3>
<p>Income: <span id="incomeText"></span></p>
<p>Expense: <span id="expenseText"></span></p>
<p>Balance: <span id="balanceText"></span></p>
<p id="warning" class="warning"></p>

<h3>📊 Charts</h3>
<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>

<script type="module">

// 🔥 Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyCB6STfr6FWPbPddQzyooOjtwHSo85KJd8",
authDomain: "income-tracker-c1b8c.firebaseapp.com",
projectId: "income-tracker-c1b8c",
storageBucket: "income-tracker-c1b8c.appspot.com",
messagingSenderId: "809343066758",
appId: "1:809343066758:web:608a4480f1e85d992d6707"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let expenses = [];
let editId = null;

// 🔄 REALTIME LISTENER
onSnapshot(collection(db, "expenses"), (snap) => {
expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
render();
});

// ➕ ADD / UPDATE
window.addExpense = async function(){

const name = document.getElementById("name").value;
const amount = Number(document.getElementById("amount").value);
const category = document.getElementById("category").value;
const date = document.getElementById("date").value;

if(!name || amount <= 0) return;

if(editId){
await updateDoc(doc(db,"expenses",editId),{
name,amount,category,date
});
editId = null;
}else{
await addDoc(collection(db,"expenses"),{
name,amount,category,date
});
}

document.getElementById("name").value="";
document.getElementById("amount").value="";
}

// ❌ DELETE
window.deleteExpense = async function(id){
await deleteDoc(doc(db,"expenses",id));
}

// ✏️ EDIT
window.editExpense = function(id){
const e = expenses.find(x=>x.id===id);

document.getElementById("name").value = e.name;
document.getElementById("amount").value = e.amount;
document.getElementById("category").value = e.category;
document.getElementById("date").value = e.date;

editId = id;
}

// 🔄 RENDER UI
window.render = function(){

let income = Number(document.getElementById("income").value || 0);
let total = 0;

let monthly = {};
let category = {};

let list = document.getElementById("list");
list.innerHTML = "";

expenses.forEach(e=>{
total += e.amount;

// monthly
if(e.date){
let m = e.date.substring(0,7);
monthly[m] = (monthly[m]||0)+e.amount;
}

// category
category[e.category] = (category[e.category]||0)+e.amount;

// UI list
list.innerHTML += `
<div class="card">
${e.date || "-"} | ${e.category}<br>
<b>${e.name}</b> - ¥${e.amount}<br><br>

<button onclick="editExpense('${e.id}')">Edit</button>
<button onclick="deleteExpense('${e.id}')">Delete</button>
</div>
`;
});

// summary
document.getElementById("incomeText").innerText = "¥"+income;
document.getElementById("expenseText").innerText = "¥"+total;
document.getElementById("balanceText").innerText = "¥"+(income-total);

document.getElementById("warning").innerText =
total > income ? "⚠️ Over Budget!" : "";

// charts
drawCharts(monthly,category);
}

let barChart;
let pieChart;

// 📊 CHARTS
function drawCharts(monthly,category){

if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();

barChart = new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:Object.keys(monthly),
datasets:[{
label:"Monthly Expense",
data:Object.values(monthly)
}]
}
});

pieChart = new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:Object.keys(category),
datasets:[{
data:Object.values(category)
}]
}
});
}

</script>

</body>
</html>
