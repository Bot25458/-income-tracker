<!DOCTYPE html><html>
<head>
<title>Income Tracker Save Version</title><style>
body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
}

button{
cursor:pointer;
}

.warning{
color:red;
font-weight:bold;
}

.delete-btn{
width:auto;
padding:5px 10px;
margin-left:10px;
}
</style></head>
<body><h2>💰 Income Tracker</h2>

<label>Monthly Income</label>
<input type="number" id="income">

<label>Expense Name</label>
<input type="text" id="name">

<label>Expense Amount</label>
<input type="number" id="amount">

<button onclick="addExpense()">Add Expense</button>

<h3>Expenses</h3>
<ul id="list"></ul><p><b>Income:</b> ¥<span id="incomeText">0</span></p>
<p><b>Total Expense:</b> ¥<span id="expenseText">0</span></p>
<p><b>Balance:</b> ¥<span id="balanceText">0</span></p><p id="warning" class="warning"></p>

<script>

let expenses =
JSON.parse(localStorage.getItem("expenses")) || [];

document.getElementById("income").value =
localStorage.getItem("income") || "";

document
.getElementById("income")
.addEventListener("input", function(){

localStorage.setItem(
"income",
document.getElementById("income").value
);

update();

});

function addExpense(){

let name =
document.getElementById("name").value;

let amount =
Number(document.getElementById("amount").value);

if(name==="" || amount<=0){
return;
}

expenses.push({
name:name,
amount:amount
});

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

document.getElementById("name").value="";
document.getElementById("amount").value="";

update();

}

function deleteExpense(index){

expenses.splice(index,1);

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

update();

}

function update(){

let income =
Number(document.getElementById("income").value);

let total = 0;

let list =
document.getElementById("list");

list.innerHTML="";

expenses.forEach(function(e,index){

total += e.amount;

list.innerHTML +=
"<li>" +
e.name +
" - ¥" +
e.amount +
' <button class="delete-btn" onclick="deleteExpense(' +
index +
')">Delete</button></li>';

});

let balance =
income - total;

document.getElementById("incomeText").innerText =
income;

document.getElementById("expenseText").innerText =
total;

document.getElementById("balanceText").innerText =
balance;

if(total > income){

document.getElementById("warning").innerText =
"⚠️ Expense is higher than Income";

}else{

document.getElementById("warning").innerText =
"";

}

}

update();

</script></body>
</html>
